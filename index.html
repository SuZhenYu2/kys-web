<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>武侠江湖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ============================================
           顶部状态栏
           ============================================ */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
            pointer-events: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-name {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .player-level {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .hp-bar-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bar-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            text-transform: uppercase;
        }

        .hp-bar {
            width: 120px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #66BB6A);
            border-radius: 4px;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .mp-bar {
            width: 120px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mp-fill {
            height: 100%;
            background: linear-gradient(90deg, #2196F3, #42A5F5);
            border-radius: 4px;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
        }

        .bar-text {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
            text-align: right;
        }

        /* ============================================
           侧边快捷按钮
           ============================================ */
        #side-buttons {
            position: fixed;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-btn {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.85), rgba(22, 33, 62, 0.85));
            border: 2px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.35),
                inset 0 2px 4px rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.15s ease-out;
            cursor: pointer;
            font-size: 26px;
        }

        .side-btn:active {
            transform: scale(0.9);
            background: linear-gradient(145deg, rgba(45, 58, 92, 0.95), rgba(35, 48, 82, 0.95));
        }

        /* ============================================
           战斗模式按钮
           ============================================ */
        #battle-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            display: none;
            padding: 20px;
        }

        #battle-controls.active {
            display: block;
        }

        .battle-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .battle-btn {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.92), rgba(22, 33, 62, 0.92));
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 8px 30px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.15s ease-out;
            cursor: pointer;
        }

        .battle-btn:active {
            transform: scale(0.9);
            background: linear-gradient(145deg, rgba(45, 58, 92, 0.98), rgba(35, 48, 82, 0.98));
        }

        .battle-btn.attack {
            background: linear-gradient(145deg, rgba(217, 74, 74, 0.95), rgba(173, 53, 53, 0.95));
            border: 2px solid rgba(255, 106, 106, 0.4);
            box-shadow: 
                0 8px 25px rgba(217, 74, 74, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .battle-btn.skill {
            background: linear-gradient(145deg, rgba(217, 179, 74, 0.95), rgba(173, 142, 53, 0.95));
            border: 2px solid rgba(255, 210, 106, 0.4);
            box-shadow: 
                0 8px 25px rgba(217, 179, 74, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .battle-btn-icon {
            font-size: 28px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .battle-btn-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ============================================
           点击指示器
           ============================================ */
        #click-indicator {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.6);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 25;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.2s ease-out, transform 0.2s ease-out;
        }

        #click-indicator.active {
            opacity: 1;
            animation: clickRipple 0.5s ease-out;
        }

        @keyframes clickRipple {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- 顶部状态栏 -->
    <div id="top-bar">
        <div class="status-bar">
            <div class="player-info">
                <div class="player-name">侠客</div>
                <div class="player-level">等级 1</div>
            </div>
            <div class="hp-bar-container">
                <div class="bar-label">HP</div>
                <div class="hp-bar">
                    <div class="hp-fill" id="hp-fill" style="width: 100%"></div>
                </div>
                <div class="bar-text" id="hp-text">100/100</div>
            </div>
            <div class="hp-bar-container">
                <div class="bar-label">MP</div>
                <div class="mp-bar">
                    <div class="mp-fill" id="mp-fill" style="width: 100%"></div>
                </div>
                <div class="bar-text" id="mp-text">50/50</div>
            </div>
        </div>
    </div>

    <!-- 侧边快捷按钮 -->
    <div id="side-buttons">
        <div class="side-btn" id="btn-menu" title="菜单">☰</div>
        <div class="side-btn" id="btn-inventory" title="背包">🎒</div>
        <div class="side-btn" id="btn-skill" title="武功">📚</div>
    </div>

    <!-- 战斗模式按钮 -->
    <div id="battle-controls">
        <div class="battle-actions">
            <div class="battle-btn" id="btn-battle-escape">
                <span class="battle-btn-icon">🏃</span>
                <span class="battle-btn-label">逃跑</span>
            </div>
            <div class="battle-btn" id="btn-battle-item">
                <span class="battle-btn-icon">🎒</span>
                <span class="battle-btn-label">物品</span>
            </div>
            <div class="battle-btn skill" id="btn-battle-skill">
                <span class="battle-btn-icon">🗡️</span>
                <span class="battle-btn-label">武功</span>
            </div>
            <div class="battle-btn attack" id="btn-battle-attack">
                <span class="battle-btn-icon">⚔️</span>
                <span class="battle-btn-label">攻击</span>
            </div>
        </div>
    </div>

    <!-- 点击指示器 -->
    <div id="click-indicator"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
