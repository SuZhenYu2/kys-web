server:
  port: 8080

spring:
  application:
    name: kys-rpg-backend
  datasource:
    url: jdbc:mysql://localhost:3306/kys_rpg?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 60000

kys:
  jwt:
    secret: ${JWT_SECRET:kys-rpg-secret-key-256bit-minimum-32-characters}
    expiration-ms: 86400000

logging:
  level:
    com.kys.rpg: INFO
    org.springframework.security: INFO
